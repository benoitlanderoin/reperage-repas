<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎬 Repérage Repas</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
:root {
  --bg:#0f0f0d; --sur:#191917; --card:#222220; --bor:#2e2e2a;
  --acc:#e8a020; --adim:#7a5210; --txt:#e8dcc8; --mut:#5a5a52;
  --ok:#4caf6e; --wn:#e05252; --info:#4a9eff;
  --fn:'DM Mono','Courier New',monospace; --dp:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}

/* HEADER */
.hdr{background:var(--sur);border-bottom:1px solid var(--bor);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.logo{background:var(--acc);color:var(--bg);width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;cursor:pointer;}
.hdrr{margin-left:auto;display:flex;align-items:center;gap:8px;}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:var(--fn);font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;border-radius:5px;padding:10px 16px;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.97);} .btn:disabled{opacity:.35;cursor:not-allowed;}
.bp{background:var(--acc);color:var(--bg);}
.bg{background:transparent;color:var(--mut);border:1px solid var(--bor);}
.bs{background:var(--sur);color:var(--txt);border:1px solid var(--bor);}
.bd{background:#3d1a1a;color:var(--wn);border:1px solid #5c2a2a44;}
.bw{background:#1a3d26;color:var(--ok);border:1px solid #2a5c3644;text-decoration:none;}
.fw{width:100%;}

/* INPUTS */
.inp{background:var(--sur);border:1px solid var(--bor);color:var(--txt);font-family:var(--fn);font-size:13px;border-radius:4px;padding:10px 12px;width:100%;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--acc);} .inp::placeholder{color:var(--mut);} textarea.inp{resize:vertical;}
select.inp{cursor:pointer;}

/* CHIPS & TAGS */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--bor);color:var(--mut);background:var(--sur);transition:all .15s;user-select:none;}
.chip:hover{border-color:var(--acc);color:var(--txt);}
.chip.sel{background:var(--adim);border-color:var(--acc);color:var(--acc);}
.cx{color:var(--wn);}
.tag{padding:3px 9px;border-radius:10px;font-size:10px;letter-spacing:1px;}
.tok{background:#1a3d26;color:var(--ok);border:1px solid #2a5c3644;}
.twt{background:#3d1a1a;color:var(--wn);border:1px solid #5c2a2a44;}

/* CARDS */
.card{background:var(--card);border-radius:8px;padding:14px;border:1px solid var(--bor);}
.card-hl{border-color:#e8a02044;} .card-wn{background:#3d1a1a22;border:1px solid #e0525233;}
.meal-card{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--bor);margin-bottom:12px;cursor:pointer;transition:all .2s;position:relative;}
.meal-card:hover{border-color:var(--acc);transform:translateY(-1px);}
.meal-card.archived{opacity:.5;border-style:dashed;}

/* LAYOUT */
.ctn{padding:22px 16px;max-width:520px;margin:0 auto;}
.lbl{font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:7px;display:block;}
.div{height:1px;background:var(--bor);margin:20px 0;}
.row{display:flex;gap:8px;align-items:center;}
.rwrap{display:flex;gap:6px;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;gap:14px;}

/* PROGRESS BAR */
.pb{height:5px;background:var(--bor);border-radius:3px;overflow:hidden;margin-top:10px;}
.pf{height:100%;background:var(--ok);border-radius:3px;transition:width .4s;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bor);margin-bottom:20px;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;letter-spacing:1px;cursor:pointer;background:transparent;border:none;color:var(--mut);font-family:var(--fn);text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;}
.tab.act{color:var(--acc);border-bottom-color:var(--acc);}

/* MEMBER ROW */
.mrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:4px;}
.mrow:hover{background:var(--card);} .mrow.act{background:var(--card);border-color:var(--acc);}

/* MODAL */
.ovl{position:fixed;inset:0;background:#000c;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.mdl{background:var(--card);border-radius:12px;padding:24px;max-width:340px;width:100%;border:1px solid var(--bor);max-height:90vh;overflow-y:auto;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:10px 20px;border-radius:20px;font-size:11px;letter-spacing:1px;z-index:200;white-space:nowrap;box-shadow:0 4px 20px #0006;animation:fU .2s ease;}
@keyframes fU{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes fI{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fI .25s ease;}

/* PREVIEW */
.prev{background:var(--sur);border-radius:6px;padding:14px;border:1px solid var(--bor);font-size:11px;color:var(--mut);white-space:pre-wrap;line-height:1.9;max-height:260px;overflow-y:auto;margin-bottom:14px;}

/* SYNC DOT */
.sync{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;margin-left:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync.off{background:var(--wn);animation:none;}

/* SECTION TITLE */
.sec-title{font-size:9px;letter-spacing:3px;color:var(--mut);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bor);}

/* SETUP SCREEN */
.setup-card{background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--bor);margin-bottom:16px;}

@media(max-width:400px){.ctn{padding:16px 12px;}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr" id="hdr">
  <div class="logo" onclick="goHome()">🎬</div>
  <div>
    <div style="font-family:var(--dp);font-size:13px;letter-spacing:1px" id="hdrTitle">REPÉRAGE REPAS</div>
    <div style="font-size:9px;color:var(--mut);letter-spacing:2px;margin-top:1px" id="hdrSub">COORDINATION ÉQUIPE</div>
  </div>
  <div class="hdrr" id="hdrR">
    <span class="sync off" id="syncDot" title="Connexion..."></span>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="app"></div>

<!-- MODAL DELETE MEAL -->
<div class="ovl" id="mDel" style="display:none">
  <div class="mdl" style="text-align:center;border-color:#e0525244">
    <div style="font-size:32px;margin-bottom:12px">🗑️</div>
    <div style="font-family:var(--dp);font-size:18px;margin-bottom:8px">Effacer ce repas ?</div>
    <div style="font-size:11px;color:var(--mut);line-height:1.7;margin-bottom:22px">
      Le restaurant, le menu et toutes les commandes seront supprimés.<br>
      <strong style="color:var(--ok)">L'équipe est conservée.</strong>
    </div>
    <div class="row" style="justify-content:center;gap:10px">
      <button class="btn bg" onclick="closeModal('mDel')">Annuler</button>
      <button class="btn bd" id="btnDelConfirm">Oui, effacer</button>
    </div>
  </div>
</div>

<!-- MODAL EDIT TEAM -->
<div class="ovl" id="mTeam" style="display:none">
  <div class="mdl">
    <div style="font-family:var(--dp);font-size:18px;margin-bottom:6px">👥 Gérer l'équipe</div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:16px;line-height:1.6">L'équipe est partagée entre tous les repas.</div>
    <div class="row" style="margin-bottom:10px">
      <input class="inp" id="nmInp" placeholder="Prénom Nom…" style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')addM()">
      <button class="btn bs" onclick="addM()">+ Ajouter</button>
    </div>
    <div style="margin-bottom:12px">
      <button class="btn" style="background:transparent;color:var(--mut);text-decoration:underline;padding:0;font-size:11px;letter-spacing:0;text-transform:none" onclick="toggleBulk()">▼ Importer plusieurs noms</button>
      <div id="bulkZ" style="display:none;margin-top:8px">
        <textarea class="inp" id="bulkT" rows="3" placeholder="Un nom par ligne…" style="font-size:12px;margin-bottom:6px"></textarea>
        <button class="btn bs" onclick="importBulk()">Importer</button>
      </div>
    </div>
    <div class="rwrap" id="teamChips" style="margin-bottom:16px"></div>
    <button class="btn bg fw" onclick="closeModal('mTeam')">Fermer</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" style="display:none"></div>

<script>
/* ══════════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════════ */
const CIR=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];
const CFG_KEY="rr-firebase-cfg";
const WA=`<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.533 5.856L.057 23.882a.5.5 0 0 0 .61.61l6.101-1.557A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.686-.535-5.197-1.459l-.372-.225-3.853.984.993-3.77-.243-.389A9.956 9.956 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let db = null;
let equipe = [];
let allRepas = {};
let currentRepasId = null;
let activeMembre = null;
let activeTab = "envoyer";
let screen = "setup"; // setup | home | repas | new

/* ══════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════ */
function h(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function cap(s){return s?s[0].toUpperCase()+s.slice(1):s;}
function td(){return new Date().toISOString().split("T")[0];}
function fmtD(d){if(!d)return"";try{return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});}catch{return d;}}
function fmtDShort(d){if(!d)return"";try{return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});}catch{return d;}}
function waL(t){return`https://wa.me/?text=${encodeURIComponent(t)}`;}
function toast(m,isErr){
  const t=document.getElementById("toast");
  t.textContent=m; t.style.background=isErr?"var(--wn)":"var(--ok)";
  t.style.display="block"; setTimeout(()=>t.style.display="none",2800);
}
function clip(t,l){navigator.clipboard.writeText(t).then(()=>toast(`✓ ${l} copié !`)).catch(()=>toast("Copié !"));}
function closeModal(id){document.getElementById(id).style.display="none";}
function openModal(id){document.getElementById(id).style.display="flex";}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function platsList(cats){return (cats||[]).flatMap(c=>c.plats.map(p=>({...p,cNom:c.nom})));}
function platById(cats,id){return platsList(cats).find(p=>p.id===id);}
function stat(repas,nom){return((repas.cmds||{})[nom]?.ids?.length>0)?"ok":"wait";}

/* ══════════════════════════════════════════════════════
   DATE / ARCHIVE LOGIC
══════════════════════════════════════════════════════ */
function isArchived(repas){
  if(!repas.date)return false;
  const repasDate=new Date(repas.date+"T23:59:59");
  return new Date()>repasDate;
}
function shouldDelete(repas){
  if(!repas.date)return false;
  const repasDate=new Date(repas.date+"T23:59:59");
  const diffDays=(new Date()-repasDate)/(1000*60*60*24);
  return diffDays>2;
}
function cleanOldRepas(){
  Object.entries(allRepas).forEach(([id,r])=>{
    if(shouldDelete(r)){
      db.ref(`repas/${id}`).remove();
    }
  });
}

/* ══════════════════════════════════════════════════════
   FIREBASE SETUP
══════════════════════════════════════════════════════ */
function loadFirebaseCfg(){
  try{const v=localStorage.getItem(CFG_KEY);return v?JSON.parse(v):null;}catch{return null;}
}
function saveFirebaseCfg(cfg){
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
}

function initFirebase(cfg){
  try{
    if(firebase.apps.length===0){firebase.initializeApp(cfg);}
    db=firebase.database();
    // Test connection
    db.ref(".info/connected").on("value",snap=>{
      const dot=document.getElementById("syncDot");
      if(dot){dot.className=snap.val()?"sync":"sync off";}
    });
    // Listen to equipe
    db.ref("equipe").on("value",snap=>{
      equipe=snap.val()||[];
      if(screen==="home") renderHome();
      refreshTeamChips();
    });
    // Listen to all repas
    db.ref("repas").on("value",snap=>{
      allRepas=snap.val()||{};
      cleanOldRepas();
      if(screen==="home") renderHome();
      if(screen==="repas"&&currentRepasId){
        const r=allRepas[currentRepasId];
        if(r) renderRepasDetail(r); else goHome();
      }
    });
    return true;
  }catch(e){
    console.error(e); return false;
  }
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
function goHome(){
  screen="home"; currentRepasId=null; activeMembre=null; activeTab="envoyer";
  document.getElementById("hdrTitle").textContent="REPÉRAGE REPAS";
  document.getElementById("hdrSub").textContent="COORDINATION ÉQUIPE";
  document.getElementById("hdrR").innerHTML=`
    <button class="btn bs" style="font-size:10px;padding:6px 10px" onclick="openModal('mTeam')">👥 Équipe</button>
    <span class="sync" id="syncDot"></span>`;
  // Re-init sync dot
  db.ref(".info/connected").on("value",snap=>{
    const dot=document.getElementById("syncDot");
    if(dot)dot.className=snap.val()?"sync":"sync off";
  });
  renderHome();
}

function goToRepas(id){
  screen="repas"; currentRepasId=id; activeMembre=null; activeTab="envoyer";
  const r=allRepas[id];
  if(!r)return;
  document.getElementById("hdrTitle").textContent=h(r.restaurant||"Repas");
  document.getElementById("hdrSub").textContent=fmtDShort(r.date)+(r.label?" · "+r.label:"");
  document.getElementById("hdrR").innerHTML=`
    <button class="btn bd" style="font-size:10px;padding:6px 10px" onclick="askDeleteRepas('${id}')">🗑️ Effacer</button>
    <span class="sync" id="syncDot"></span>`;
  db.ref(".info/connected").on("value",snap=>{
    const dot=document.getElementById("syncDot");
    if(dot)dot.className=snap.val()?"sync":"sync off";
  });
  renderRepasDetail(r);
}

/* ══════════════════════════════════════════════════════
   SCREEN: SETUP
══════════════════════════════════════════════════════ */
function renderSetup(){
  screen="setup";
  document.getElementById("hdrR").innerHTML=`<span class="sync off" id="syncDot"></span>`;
  document.getElementById("app").innerHTML=`
  <div class="ctn fi">
    <div style="margin-bottom:24px">
      <div style="font-family:var(--dp);font-size:22px;margin-bottom:6px">Configuration Firebase</div>
      <div style="font-size:11px;color:var(--mut);line-height:1.7">
        Pour synchroniser les données en temps réel entre tous les utilisateurs, vous avez besoin d'un compte Firebase gratuit.<br><br>
        Suivez les étapes ci-dessous, puis collez votre configuration.
      </div>
    </div>

    <div class="setup-card" style="margin-bottom:12px">
      <div style="font-size:10px;color:var(--acc);letter-spacing:2px;margin-bottom:10px">ÉTAPES À SUIVRE</div>
      <div style="font-size:12px;color:var(--txt);line-height:2.2">
        1. Allez sur <strong>console.firebase.google.com</strong><br>
        2. Cliquez <strong>"Créer un projet"</strong> → donnez un nom → continuer<br>
        3. Dans le menu gauche → <strong>"Realtime Database"</strong><br>
        4. Cliquez <strong>"Créer une base de données"</strong> → choisissez <strong>"Mode test"</strong><br>
        5. Retournez à l'accueil du projet → icône <strong>&lt;/&gt;</strong> (Web)<br>
        6. Donnez un nom à l'app → copiez l'objet <strong>firebaseConfig</strong><br>
        7. Collez-le ci-dessous
      </div>
    </div>

    <div class="setup-card">
      <label class="lbl">Collez votre firebaseConfig ici</label>
      <textarea class="inp" id="fbCfgInput" rows="8" placeholder='const firebaseConfig = {
  apiKey: "...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};' style="font-size:11px;font-family:monospace;margin-bottom:12px"></textarea>
      <div style="font-size:10px;color:var(--wn);margin-bottom:12px;display:none" id="cfgErr">⚠️ Configuration invalide — vérifiez que vous avez bien copié tout le bloc firebaseConfig.</div>
      <button class="btn bp fw" onclick="trySaveConfig()">✓ Connecter et démarrer</button>
    </div>
  </div>`;
}

function trySaveConfig(){
  let raw=document.getElementById("fbCfgInput").value.trim();
  const err=document.getElementById("cfgErr");
  // Extract JSON from the config block
  try{
    // Handle both "const firebaseConfig = {...}" and raw JSON
    let jsonStr=raw;
    const match=raw.match(/\{[\s\S]*\}/);
    if(match)jsonStr=match[0];
    const cfg=JSON.parse(jsonStr);
    if(!cfg.apiKey||!cfg.databaseURL){throw new Error("Missing fields");}
    saveFirebaseCfg(cfg);
    err.style.display="none";
    const ok=initFirebase(cfg);
    if(ok){goHome();}
    else{err.style.display="block";}
  }catch(e){
    err.style.display="block";
  }
}

/* ══════════════════════════════════════════════════════
   SCREEN: HOME
══════════════════════════════════════════════════════ */
function renderHome(){
  const el=document.getElementById("app");
  const repasArr=Object.values(allRepas).sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
  const active=repasArr.filter(r=>!isArchived(r));
  const archived=repasArr.filter(r=>isArchived(r));

  let html=`<div class="ctn fi">
    <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:24px">
      <div style="font-family:var(--dp);font-size:22px">Mes repas</div>
      <button class="btn bp" onclick="renderNewRepas()">+ Nouveau repas</button>
    </div>`;

  if(!active.length&&!archived.length){
    html+=`<div style="text-align:center;padding:40px 0">
      <div style="font-size:40px;margin-bottom:16px">🍽️</div>
      <div style="font-family:var(--dp);font-size:16px;margin-bottom:8px;color:var(--txt)">Aucun repas en cours</div>
      <div style="font-size:12px;color:var(--mut)">Créez votre premier repas pour commencer</div>
    </div>`;
  }

  // Active meals
  if(active.length){
    html+=`<div class="sec-title">En cours</div>`;
    active.forEach(r=>{ html+=mealCard(r,false); });
  }

  // Archived meals (past but < 2 days)
  if(archived.length){
    html+=`<div class="sec-title" style="margin-top:24px">Archivés <span style="font-size:9px;color:var(--mut)">(effacés automatiquement après 2 jours)</span></div>`;
    archived.forEach(r=>{ html+=mealCard(r,true); });
  }

  html+=`</div>`;
  el.innerHTML=html;
}

function mealCard(r,archived){
  const responded=(equipe||[]).filter(n=>stat(r,n)==="ok").length;
  const total=(equipe||[]).length;
  const pct=total?(responded/total*100):0;
  const dateStr=cap(fmtD(r.date));
  return `
  <div class="meal-card${archived?" archived":""}" onclick="goToRepas('${r.id}')">
    <div class="row" style="justify-content:space-between;margin-bottom:8px">
      <div style="font-family:var(--dp);font-size:16px;color:var(--txt)">${h(r.restaurant||"Restaurant")}</div>
      ${archived?`<span class="tag" style="background:#2a2a20;color:var(--mut);border:1px solid var(--bor);font-size:9px">Archivé</span>`:""}
    </div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:4px">
      📅 ${dateStr}${r.label?" · "+h(r.label):""}
    </div>

      👥 ${responded}/${total} réponse${responded!==1?"s":""}

    <div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:18px">›</div>

}

   SCREEN: NEW REPAS
══════════════════════════════════════════════════════ */
function renderNewRepas(){
  screen="new";
  document.getElementById("hdrTitle").textContent="NOUVEAU REPAS";
  document.getElementById("hdrSub").textContent="";
  document.getElementById("hdrR").innerHTML=`<button class="btn bg" onclick="goHome()">← Retour</button><span class="sync" id="syncDot"></span>`;

  document.getElementById("app").innerHTML=`
  <div class="ctn fi">
    <div style="margin-bottom:22px">
      <div style="font-family:var(--dp);font-size:22px;margin-bottom:5px">Nouveau repas</div>
      <div style="font-size:11px;color:var(--mut)">Renseignez les infos puis ajoutez le menu</div>
    </div>
    <div class="col">
      <div><label class="lbl">Restaurant</label>
        <input class="inp" id="nrResto" placeholder="ex : Bistrot du Centre"></div>
      <div><label class="lbl">Date</label>
        <input class="inp" id="nrDate" type="date" value="${td()}"></div>
      <div><label class="lbl">Service</label>
        <select class="inp" id="nrLabel">
          <option value="déjeuner">Déjeuner</option>
          <option value="dîner">Dîner</option>
          <option value="autre">Autre</option>
        </select>
      </div>
      <div><label class="lbl">Heure d'arrivée</label>
        <input class="inp" id="nrHeure" type="time" value="12:30"></div>
    </div>

    <div class="div"></div>

    <!-- MENU BUILDER -->
    <div style="font-family:var(--dp);font-size:16px;margin-bottom:14px">Menu</div>
    <div id="catsContainer"></div>
    <div class="row" style="margin-bottom:22px">
      <input class="inp" id="ncInp" placeholder="Nouvelle catégorie…" style="font-size:12px;flex:1" onkeydown="if(event.key==='Enter')addCatNew()">
      <button class="btn bs" onclick="addCatNew()">+ Catégorie</button>
    </div>

    <button class="btn bp fw" onclick="createRepas()">Créer ce repas →</button>
  </div>`;

  // Default categories
  window._newCats=[
    {id:genId(),nom:"Entrées",plats:[]},
    {id:genId(),nom:"Plats",plats:[]},
    {id:genId(),nom:"Desserts",plats:[]}
  ];
  renderNewCats();
}

function renderNewCats(){
  const el=document.getElementById("catsContainer");
  if(!el)return;
  let html="";
  window._newCats.forEach(c=>{
    html+=`<div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:10px;justify-content:space-between">
        <span style="font-size:12px;color:var(--acc);letter-spacing:1px">${h(c.nom.toUpperCase())}</span>
        <button class="btn bd" style="padding:3px 8px;font-size:10px" onclick="rmCatNew('${c.id}')">✕</button>
      </div>
      <div class="rwrap" style="margin-bottom:10px">
        ${c.plats.map(p=>`<span class="chip" onclick="rmPlatNew('${c.id}','${p.id}')">${h(p.nom)} <span class="cx">✕</span></span>`).join("")}
        ${!c.plats.length?`<span style="font-size:11px;color:var(--mut)">Aucun plat</span>`:""}
      </div>
      <div class="row">
        <input class="inp" id="np_${c.id}" placeholder="Nom du plat…" style="font-size:12px;flex:1" onkeydown="if(event.key==='Enter')addPlatNew('${c.id}')">
        <button class="btn bs" onclick="addPlatNew('${c.id}')">+ Ajouter</button>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function addPlatNew(cid){
  const e=document.getElementById(`np_${cid}`);const n=e.value.trim();if(!n)return;
  const cat=window._newCats.find(c=>c.id===cid);
  cat.plats.push({id:genId(),nom:n});e.value="";renderNewCats();
  document.getElementById(`np_${cid}`)?.focus();
}
function rmPlatNew(cid,pid){
  const cat=window._newCats.find(c=>c.id===cid);
  cat.plats=cat.plats.filter(p=>p.id!==pid);renderNewCats();
}
function addCatNew(){
  const e=document.getElementById("ncInp");const n=e.value.trim();if(!n)return;
  window._newCats.push({id:genId(),nom:n,plats:[]});e.value="";renderNewCats();
}
function rmCatNew(cid){
  window._newCats=window._newCats.filter(c=>c.id!==cid);renderNewCats();
}

function createRepas(){
  const resto=document.getElementById("nrResto").value.trim();
  const date=document.getElementById("nrDate").value;
  const label=document.getElementById("nrLabel").value;
  const heure=document.getElementById("nrHeure").value;
  if(!resto){toast("⚠️ Indiquez le nom du restaurant",true);return;}
  if(!date){toast("⚠️ Indiquez la date",true);return;}
  const totalPlats=(window._newCats||[]).reduce((s,c)=>s+c.plats.length,0);
  if(!totalPlats){toast("⚠️ Ajoutez au moins un plat au menu",true);return;}

  const id=genId();
  const repas={id,restaurant:resto,date,label,heure,cats:window._newCats,cmds:{},createdAt:Date.now()};
  db.ref(`repas/${id}`).set(repas).then(()=>{
    toast("✓ Repas créé !");
    goToRepas(id);
  }).catch(()=>toast("Erreur de connexion",true));
}

/* ══════════════════════════════════════════════════════
   SCREEN: REPAS DETAIL
══════════════════════════════════════════════════════ */
function renderRepasDetail(repas){
  const el=document.getElementById("app");
  const eq=equipe||[];
  const responded=eq.filter(n=>stat(repas,n)==="ok").length;
  const pct=eq.length?(responded/eq.length*100):0;
  const archived=isArchived(repas);

  let html=`<div class="ctn fi">`;

  // Archive banner
  if(archived){
    html+=`<div style="background:#3d1a1a22;border:1px solid #e0525233;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:var(--wn);text-align:center">
      📦 Repas archivé — effacement automatique 2 jours après la date
    </div>`;
  }

  // Stats bar
  html+=`
    <div class="card" style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:var(--dp);font-size:17px">${h(repas.restaurant||"Restaurant")}</div>
        <div style="font-size:10px;color:var(--mut);margin-top:3px">
          ${fmtDShort(repas.date)}${repas.label?" · "+h(repas.label):""} · ${repas.heure}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:26px;font-weight:700;color:${responded===eq.length&&eq.length?"var(--ok)":"var(--acc)"}">${responded}/${eq.length}</div>
        <div style="font-size:9px;color:var(--mut);letter-spacing:1px">RÉPONSES</div>
      </div>
    </div>
    <div class="pb" style="margin-bottom:20px"><div class="pf" style="width:${pct}%"></div></div>

    <div class="tabs">
      <button class="tab${activeTab==="envoyer"?" act":""}" onclick="setTab('envoyer')">📤 Envoyer</button>
      <button class="tab${activeTab==="saisir"?" act":""}" onclick="setTab('saisir')">✏️ Saisir</button>
      <button class="tab${activeTab==="recap"?" act":""}" onclick="setTab('recap')">📋 Récap</button>
    </div>`;

  /* TAB ENVOYER */
  if(activeTab==="envoyer"){
    html+=`<div class="fi"><div style="font-size:11px;color:var(--mut);margin-bottom:14px;line-height:1.7">Envoyez le menu à chaque personne. Ils répondent avec les numéros, vous saisissez dans "Saisir".</div>`;
    if(!eq.length){
      html+=`<div style="text-align:center;padding:20px;color:var(--mut);font-size:12px">
        Aucun membre dans l'équipe.<br>
        <button class="btn bs" style="margin-top:12px" onclick="openModal('mTeam')">+ Gérer l'équipe</button>
      </div>`;
    } else {
      eq.forEach(nom=>{
        const msg=buildMsgMembre(repas,nom);
        const st=stat(repas,nom);
        html+=`<div class="card" style="margin-bottom:10px">
          <div class="row" style="justify-content:space-between;margin-bottom:10px">
            <span style="font-size:14px;font-weight:500">${h(nom)}</span>
            <span class="tag ${st==="ok"?"tok":"twt"}">${st==="ok"?"✓ Répondu":"○ En attente"}</span>
          </div>
          <div class="row">
            <a class="btn bw" style="flex:1;text-decoration:none" href="${h(waL(msg))}" target="_blank">${WA} WhatsApp</a>
            <button class="btn bs" style="flex:1" onclick="clip(${JSON.stringify(msg)},'Message')">📋 Copier</button>
          </div>
        </div>`;
      });
    }
    html+=`</div>`;
  }

  /* TAB SAISIR */
  if(activeTab==="saisir"){
    html+=`<div class="fi"><div style="font-size:11px;color:var(--mut);margin-bottom:14px;line-height:1.7">Cliquez sur un membre, cochez ses plats au fur et à mesure des réponses.</div>`;
    if(!eq.length){
      html+=`<div style="text-align:center;padding:20px;color:var(--mut);font-size:12px">Aucun membre.<button class="btn bs" style="margin-top:12px" onclick="openModal('mTeam')">+ Gérer l'équipe</button></div>`;
    } else {
      eq.forEach(nom=>{
        const nb=(repas.cmds||{})[nom]?.ids?.length||0;
        const act=activeMembre===nom;
        html+=`<div class="mrow${act?" act":""}" onclick="setMb('${h(nom)}')">
          <div style="flex:1">
            <div style="font-size:13px">${h(nom)}</div>
            ${nb?`<div style="font-size:10px;color:var(--mut);margin-top:2px">${nb} plat${nb!==1?"s":""} sélectionné${nb!==1?"s":""}</div>`:""}
          </div>
          <span class="tag ${stat(repas,nom)==="ok"?"tok":"twt"}">${stat(repas,nom)==="ok"?"✓ Répondu":"○ En attente"}</span>
        </div>`;
      });
      if(activeMembre){
        const nom=activeMembre;
        const ids=(repas.cmds||{})[nom]?.ids||[];
        const comment=(repas.cmds||{})[nom]?.comment||"";
        html+=`<div class="card card-hl" style="margin-top:14px">
          <div style="font-size:12px;color:var(--acc);letter-spacing:1px;margin-bottom:14px;font-weight:500">→ ${h(nom.toUpperCase())}</div>`;
        (repas.cats||[]).forEach(c=>{
          if(!c.plats.length)return;
          html+=`<div style="margin-bottom:14px"><label class="lbl">${h(c.nom)}</label><div class="rwrap">`;
          c.plats.forEach(p=>{
            const sel=ids.includes(p.id);
            html+=`<span class="chip${sel?" sel":""}" onclick="togglePlat('${h(nom)}','${p.id}')">${sel?"✓ ":""}${h(p.nom)}</span>`;
          });
          html+=`</div></div>`;
        });
        html+=`<label class="lbl">Note / allergie</label>
          <input class="inp" placeholder="Sans gluten, allergie…" value="${h(comment)}"
            oninput="setNote('${h(nom)}',this.value)" style="font-size:12px">
        </div>`;
      }
    }
    html+=`</div>`;
  }

  /* TAB RECAP */
  if(activeTab==="recap"){
    const recap=buildRecap(repas);
    const waiting=eq.filter(n=>stat(repas,n)==="wait");
    html+=`<div class="fi">
      <div class="rwrap" style="margin-bottom:14px">
        <div class="card" style="padding:8px 14px"><span style="color:var(--ok);font-size:13px">✓ ${responded}</span> <span style="font-size:10px;color:var(--mut)">répondu</span></div>
        <div class="card" style="padding:8px 14px"><span style="color:var(--wn);font-size:13px">○ ${eq.length-responded}</span> <span style="font-size:10px;color:var(--mut)">en attente</span></div>
      </div>`;
    if(waiting.length){
      html+=`<div class="card card-wn" style="margin-bottom:14px">
        <div style="font-size:9px;color:var(--wn);letter-spacing:2px;margin-bottom:8px">EN ATTENTE DE RÉPONSE</div>
        <div class="rwrap">${waiting.map(n=>`<span style="font-size:11px;color:var(--wn);background:#3d1a1a;padding:4px 10px;border-radius:12px;border:1px solid #5c2a2a44">${h(n)}</span>`).join("")}</div>
      </div>`;
    }
    html+=`<div class="prev">${h(recap)}</div>
      <div class="row">
        <a class="btn bw" style="flex:1;text-decoration:none" href="${h(waL(recap))}" target="_blank">${WA} WhatsApp restaurant</a>
        <button class="btn bs" style="flex:1" onclick="clip(${JSON.stringify(recap)},'Récap')">📋 Copier</button>
      </div>
    </div>`;
  }

  html+=`</div>`;
  el.innerHTML=html;
}

/* ══════════════════════════════════════════════════════
   ACTIONS ON REPAS
══════════════════════════════════════════════════════ */
function setTab(t){activeTab=t;if(currentRepasId&&allRepas[currentRepasId])renderRepasDetail(allRepas[currentRepasId]);}
function setMb(n){activeMembre=n;if(currentRepasId&&allRepas[currentRepasId])renderRepasDetail(allRepas[currentRepasId]);}

function togglePlat(nom,platId){
  if(!currentRepasId)return;
  const path=`repas/${currentRepasId}/cmds/${nom}`;
  db.ref(path).once("value",snap=>{
    const cur=snap.val()||{ids:[],comment:""};
    const ids=[...(cur.ids||[])];
    const i=ids.indexOf(platId);
    if(i>-1)ids.splice(i,1); else ids.push(platId);
    db.ref(path).set({ids,comment:cur.comment||""});
  });
}

function setNote(nom,val){
  if(!currentRepasId)return;
  const path=`repas/${currentRepasId}/cmds/${nom}/comment`;
  db.ref(path).set(val);
}

function askDeleteRepas(id){
  document.getElementById("btnDelConfirm").onclick=()=>deleteRepas(id);
  openModal("mDel");
}

function deleteRepas(id){
  db.ref(`repas/${id}`).remove().then(()=>{
    closeModal("mDel");
    toast("✓ Repas effacé");
    goHome();
  }).catch(()=>toast("Erreur",true));
}

function refreshTeamChips(){
  const el=document.getElementById("teamChips");
  if(!el)return;
  el.innerHTML=(equipe||[]).map(n=>`<span class="chip" onclick="rmM('${h(n)}')">${h(n)} <span class="cx">✕</span></span>`).join("")||`<span style="font-size:11px;color:var(--mut)">Aucun membre</span>`;
}

function addM(){
  const e=document.getElementById("nmInp");const n=e.value.trim();
  if(!n||equipe.includes(n))return;
  const newTeam=[...equipe,n];
  db.ref("equipe").set(newTeam).then(()=>{e.value="";});
}

function rmM(n){
  const newTeam=equipe.filter(x=>x!==n);
  db.ref("equipe").set(newTeam);
}

function toggleBulk(){
  const z=document.getElementById("bulkZ");
  z.style.display=z.style.display==="none"?"block":"none";
}

function importBulk(){
  const v=document.getElementById("bulkT").value;
  const noms=v.split(/[\n,;]+/).map(n=>n.trim()).filter(n=>n&&!equipe.includes(n));
  const newTeam=[...equipe,...noms];
  db.ref("equipe").set(newTeam).then(()=>{
    document.getElementById("bulkT").value="";
    document.getElementById("bulkZ").style.display="none";
  });
}

// Keep team chips fresh when modal opens
const origOpen=openModal;
window.openModal=function(id){
  origOpen(id);
  if(id==="mTeam")refreshTeamChips();
};

/* ══════════════════════════════════════════════════════
   MESSAGE BUILDERS
══════════════════════════════════════════════════════ */
function buildMsgMembre(repas,nom){
  let m=`🎬 REPAS D'ÉQUIPE\n`;
  if(repas.restaurant)m+=`📍 ${repas.restaurant}\n`;
  if(repas.date)m+=`📅 ${cap(fmtD(repas.date))}${repas.label?" – "+repas.label:""} · ${repas.heure}\n`;
  m+=`\nBonjour ${nom} ! Choisis tes plats et réponds avec les numéros 👇\n\n`;
  let i=0;
  (repas.cats||[]).forEach(c=>{
    if(!c.plats.length)return;
    m+=`— ${c.nom.toUpperCase()} —\n`;
    c.plats.forEach(p=>{m+=`${CIR[i]} ${p.nom}\n`;i++;});
    m+="\n";
  });
  if(i>0)m+=`Réponds ex: "${CIR[0]}, ${CIR[Math.min(i-1,2)]}" 🙏`;
  return m;
}

function buildRecap(repas){
  const eq=equipe||[];
  const cmds=repas.cmds||{};
  let m=`📋 COMMANDE GROUPE\n`;
  if(repas.restaurant)m+=`📍 ${repas.restaurant}\n`;
  if(repas.date)m+=`📅 ${cap(fmtD(repas.date))}${repas.label?" – "+repas.label:""} · arrivée ${repas.heure}\n`;
  m+=`👥 ${eq.length} personnes\n${"─".repeat(32)}\n\n`;
  eq.forEach((nom,i)=>{
    const cmd=cmds[nom];m+=`${i+1}. ${nom.toUpperCase()}\n`;
    if(!cmd||!cmd.ids?.length){m+=`   (pas de réponse)\n`;return;}
    const byC={};
    cmd.ids.forEach(id=>{const p=platById(repas.cats,id);if(p){if(!byC[p.cNom])byC[p.cNom]=[];byC[p.cNom].push(p.nom);}});
    Object.entries(byC).forEach(([c,pp])=>{m+=`   ${c} : ${pp.join(", ")}\n`;});
    if(cmd.comment)m+=`   💬 ${cmd.comment}\n`;
  });
  m+=`\n${"─".repeat(32)}\n\nRÉCAPITULATIF PAR PLAT\n`;
  const cnt={};
  eq.forEach(n=>(cmds[n]?.ids||[]).forEach(id=>{cnt[id]=(cnt[id]||0)+1;}));
  (repas.cats||[]).forEach(c=>{
    const pp=c.plats.filter(p=>cnt[p.id]);if(!pp.length)return;
    m+=`${c.nom} :\n`;pp.forEach(p=>m+=`  × ${cnt[p.id]}  ${p.nom}\n`);
  });
  const nr=eq.filter(n=>!cmds[n]?.ids?.length);
  if(nr.length)m+=`\n⚠️ Sans réponse : ${nr.join(", ")}\n`;
  m+=`\nMerci de préparer les couverts à l'avance 🙏`;
  return m;
}
